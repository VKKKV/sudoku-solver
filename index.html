<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver - Generic DLX Solver</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div>
      <h1>Sudoku Solver</h1>
      <span class="subtitle">DLX Algorithm · Any Size · Irregular Regions</span>
    </div>
    <a href="https://github.com" class="btn" style="text-decoration:none">GitHub</a>
  </header>

  <main class="main">
    <div class="grid-panel panel">
      <div class="panel-header">
        <span>Grid</span>
        <span id="status" class="status-text"></span>
      </div>
      <div class="grid-container">
        <canvas id="grid-canvas"></canvas>
      </div>
    </div>

    <div class="controls-panel">
      <div class="panel">
        <div class="panel-header">Settings</div>
        <div class="panel-body">
          <div class="form-group">
            <label>Grid Size</label>
            <select id="grid-size">
              <option value="4">4×4</option>
              <option value="6">6×6</option>
              <option value="9" selected>9×9</option>
              <option value="12">12×12</option>
              <option value="13">13×13</option>
              <option value="16">16×16</option>
              <option value="25">25×25</option>
            </select>
          </div>

          <div class="form-group" style="margin-top:0.75rem">
            <label>Edit Mode</label>
            <div class="mode-toggle">
              <button id="mode-numbers" class="btn active">Numbers</button>
              <button id="mode-regions" class="btn">Regions</button>
            </div>
          </div>

          <div id="region-controls" class="region-controls" style="margin-top:0.75rem">
            <button id="confirm-region" class="btn btn-success">Add Region</button>
            <button id="clear-regions" class="btn">Clear All</button>
          </div>

          <div class="form-group" style="margin-top:0.75rem">
            <div class="checkbox-group">
              <input type="checkbox" id="symmetric">
              <label for="symmetric">Symmetric regions</label>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Actions</div>
        <div class="panel-body">
          <div class="btn-group" style="margin-bottom:0.75rem">
            <button id="generate-regions" class="btn">Gen Regions</button>
            <button id="random-fill" class="btn">Random Fill</button>
          </div>
          <div class="btn-group" style="margin-bottom:0.75rem">
            <button id="solve-btn" class="btn btn-primary">Solve</button>
            <button id="toggle-solution" class="btn">Show Solution</button>
          </div>
          <div class="btn-group">
            <button id="clear-grid" class="btn">Clear Grid</button>
            <button id="reset-all" class="btn">Reset All</button>
          </div>
          <div id="message"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Presets</div>
        <div class="panel-body">
          <div class="presets">
            <button id="preset-13x13" class="btn">13×13 + abcd</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Info</div>
        <div class="panel-body">
          <div class="help-text">
            <p><strong>Numbers mode:</strong> Click cell, type <span class="kbd">1</span>-<span class="kbd">9</span> or <span class="kbd">A</span>-<span class="kbd">Z</span>. Use <span class="kbd">Delete</span> to clear.</p>
            <p style="margin-top:0.5rem"><strong>Regions mode:</strong> Click cells to select, then <strong>Add Region</strong>. Each region must have exactly N cells.</p>
            <p id="symbols" style="margin-top:0.5rem"></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="status-bar">
    <span>DLX Algorithm by Donald Knuth</span>
    <span id="performance"></span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
